<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Played Games</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  h1 {
    text-align: center;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 15px;
    margin-top: 20px;
  }
  .game-card {
    padding: 10px;
    background-color: #f0f0f0;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    word-break: break-word;
  }
  .game-card img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  #clearButton {
    display: block;
    margin: 20px auto;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background-color: #ff4d4d;
    color: white;
    cursor: pointer;
  }
  #clearButton:hover {
    background-color: #e60000;
  }
</style>
</head>
<body>

<h1>Games You've Played</h1>
<button id="clearButton">Clear Played Games</button>
<div class="grid" id="gamesGrid"></div>

<script>
  const grid = document.getElementById('gamesGrid');
  const clearButton = document.getElementById('clearButton');

  function loadGames() {
    grid.innerHTML = '';
    const games = JSON.parse(localStorage.getItem('playedGames') || '[]');

    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';

      const img = document.createElement('img');
      // encode spaces in URLs
      img.src = game.icon ? encodeURI(game.icon) : 'https://via.placeholder.com/100';
      img.alt = game.name || 'Game';
      img.onerror = () => { img.src = 'https://via.placeholder.com/100'; };
      card.appendChild(img);

      const name = document.createElement('div');
      name.textContent = game.name || '';
      card.appendChild(name);

      grid.appendChild(card);
    });

    if (games.length === 0) {
      const empty = document.createElement('div');
      empty.textContent = "You haven't played any games yet!";
      empty.style.gridColumn = '1 / -1';
      empty.style.textAlign = 'center';
      grid.appendChild(empty);
    }
  }

  clearButton.addEventListener('click', () => {
    localStorage.removeItem('playedGames');
    loadGames();
  });

  loadGames();
</script>

</body>
</html>
