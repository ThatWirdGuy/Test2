<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Played Games Manager</title>
<style>
  body { font-family: sans-serif; margin: 20px; background-color: #fff; }
  .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
  button { padding: 10px; cursor: pointer; border-radius: 5px; border: 1px solid #ccc; }
  #addButton { background: #28a745; color: white; border: none; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
  .game-card { border: 1px solid #ddd; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; }
  .game-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 5px; }
  #debugLog { margin-top: 30px; padding: 10px; background: #eee; font-size: 12px; color: #666; border-radius: 5px; }
</style>
</head>
<body>

<h1>Played Games</h1>

<div class="controls">
  <button id="addButton">Add Game</button>
  <button id="clearButton">Clear All</button>
</div>

<div class="grid" id="gamesGrid"></div>

<div id="debugLog">System Status: Waiting...</div>

<script>
  const grid = document.getElementById('gamesGrid');
  const log = document.getElementById('debugLog');
  const FALLBACK = 'https://cdn.jsdelivr.net/gh/ThatWirdGuy/Game-Icons@main/Missing.png';

  function updateLog(msg) {
    log.textContent = "Status: " + msg;
  }

  function loadGames() {
    try {
      grid.innerHTML = '';
      const data = localStorage.getItem('playedGames');
      const games = JSON.parse(data || '[]');

      if (games.length === 0) {
        grid.innerHTML = '<p>No games found in storage.</p>';
        updateLog("Storage is empty.");
      } else {
        updateLog("Loaded " + games.length + " games.");
      }

      games.forEach(game => {
        const card = document.createElement('div');
        card.className = 'game-card';
        
        // Auto-fix GitHub links
        let icon = game.icon || FALLBACK;
        if(icon.includes('github.com/blob')) icon = icon.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');

        card.innerHTML = `<img src="${icon}" onerror="this.src='${FALLBACK}'"><div>${game.name}</div>`;
        
        card.onclick = () => {
          const win = window.open('about:blank', '_blank');
          if (win) {
            win.document.body.style.margin = '0';
            const ifr = win.document.createElement('iframe');
            ifr.style.cssText = "width:100%; height:100vh; border:none;";
            ifr.src = game.url;
            win.document.body.appendChild(ifr);
          }
        };
        grid.appendChild(card);
      });
    } catch (e) {
      updateLog("ERROR: LocalStorage might be blocked by your browser/school.");
    }
  }

  document.getElementById('addButton').onclick = () => {
    const name = prompt("Name:");
    const url = prompt("URL:");
    const icon = prompt("Icon URL (optional):");

    if (name && url) {
      const games = JSON.parse(localStorage.getItem('playedGames') || '[]');
      games.push({ name, url, icon });
      localStorage.setItem('playedGames', JSON.stringify(games));
      loadGames();
    }
  };

  document.getElementById('clearButton').onclick = () => {
    localStorage.removeItem('playedGames');
    loadGames();
  };

  // Run on start
  loadGames();
</script>
</body>
</html>
