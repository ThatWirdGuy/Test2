<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Played Games</title>
<style>
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 10px; background-color: transparent; color: #333; overflow-x: hidden; }
  h1 { text-align: center; font-size: 1.5rem; cursor: default; user-select: none; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
  .game-card { padding: 8px; background-color: #f9f9f9; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; border: 1px solid #eee; }
  .game-card:hover { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
  .game-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; margin-bottom: 8px; background-color: #e0e0e0; }
  .game-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .empty-msg { grid-column: 1/-1; text-align: center; opacity: 0.6; padding: 20px; font-style: italic; }
</style>
</head>
<body>

<h1 id="mainTitle">Games You've Played</h1>
<div class="grid" id="gamesGrid"></div>

<script>
  const FALLBACK = 'https://cdn.jsdelivr.net/gh/ThatWirdGuy/Game-Icons@main/Missing.png';
  const grid = document.getElementById('gamesGrid');

  function loadGames() {
    grid.innerHTML = '';
    const games = JSON.parse(localStorage.getItem('playedGames') || '[]');

    if (games.length === 0) {
      grid.innerHTML = '<div class="empty-msg">No recent games. Launch a game to see it here!</div>';
      return;
    }

    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      
      let iconUrl = game.icon || FALLBACK;
      if(iconUrl.includes('github.com') && iconUrl.includes('/blob/')) {
        iconUrl = iconUrl.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
      }

      card.innerHTML = `
        <img src="${iconUrl}" onerror="this.src='${FALLBACK}'">
        <div class="game-name">${game.name || 'Untitled'}</div>
      `;

      card.onclick = () => {
        const win = window.open('about:blank', '_blank');
        if (win) {
          win.document.body.style.cssText = "margin:0;height:100vh;overflow:hidden;";
          const iframe = win.document.createElement('iframe');
          iframe.style.cssText = "width:100%;height:100%;border:none;margin:0;";
          iframe.src = game.url;
          win.document.body.appendChild(iframe);
        }
      };
      grid.appendChild(card);
    });
  }

  // HIDDEN FEATURE: Double click the title to manually add or clear
  document.getElementById('mainTitle').ondblclick = () => {
    const action = prompt("Type 'add' to add a game or 'clear' to reset:");
    if (action === 'add') {
      const name = prompt("Game Name:");
      const url = prompt("Game URL:");
      const icon = prompt("Icon URL (optional):");
      if (name && url) {
        let games = JSON.parse(localStorage.getItem('playedGames') || '[]');
        games.push({ name, url, icon });
        localStorage.setItem('playedGames', JSON.stringify(games));
        loadGames();
      }
    } else if (action === 'clear') {
      if(confirm("Clear all games?")) {
        localStorage.removeItem('playedGames');
        loadGames();
      }
    }
  };

  loadGames();
</script>
</body>
</html>
