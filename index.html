<style>
  iframe{
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%
    overflow: hidden;
  }
</style>


<iframe id="What"></iframe>


<script>
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  
  const Url = window.location.pathname.split('/').filter(Boolean)[0]
  const GameName = decodeURIComponent(pathParts[1] || appName);
  
  document.getElementById('What').src = Url;

  const target = "https://" + Url + ".vercel.app";
  
  console.log("Loading:", target);
  
  if (Url) {
    document.getElementById('What').src = "https://" + Url + ".vercel.app"
  }

  document.title = GameName;

  let playedGames = JSON.parse(localStorage.getItem('playedGames') || '[]');

   if (!playedGames.includes(GameName)) {
    playedGames.push(GameName);
    localStorage.setItem('playedGames', JSON.stringify(playedGames));
  }

  console.log("Games you've played:", playedGames);
</script>
