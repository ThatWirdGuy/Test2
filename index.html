<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="gameFrame"></iframe>
  <script>
    const pathParts = window.location.pathname.split('/').filter(Boolean);

    const Url          = pathParts[0] || "fallback-game-domain"; // Vercel subdomain
    const GameName     = decodeURIComponent(pathParts[1] || "Unknown Game");
    const GameIconPath = decodeURIComponent(pathParts.slice(2).join('/') || "");

    // Convert GitHub blob path → jsDelivr CDN URL
    let GameIcon = "";
    if (GameIconPath) {
      GameIcon = "https://cdn.jsdelivr.net/gh/" + GameIconPath.replace("/blob/", "@");
    }

    // Load game
    document.getElementById('gameFrame').src = "https://" + Url + ".vercel.app";
    document.title = GameName;

    // Save to localStorage
    let playedGames = JSON.parse(localStorage.getItem('playedGames') || '[]');
    const existingIndex = playedGames.findIndex(g => g.name === GameName);
    const gameUrl = window.location.pathname;
    if (existingIndex !== -1) {
      playedGames[existingIndex] = { name: GameName, icon: GameIcon, url: gameUrl };
    } else {
      playedGames.push({ name: GameName, icon: GameIcon, url: gameUrl });
    }
    localStorage.setItem('playedGames', JSON.stringify(playedGames));
    console.log("Games you've played:", playedGames);
  </script>
</body>
</html>
