<title>New Tab</title>

<style>
  iframe{
    width: 100%; height: 100%;
  }
</style>


<iframe id="What"></iframe>


<script>
  const Url = window.location.pathname.split('/').filter(Boolean)[0]

  document.getElementById('What').src = Url;

  const target = "https://" + Url + ".vercel.app";
  
  console.log("Loading:", target);
  
  if (Url) {
    document.getElementById('What').src = "https://" + Url + ".vercel.app"
  }
</script>
